<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synergy - Masterwork Crafting Ledger</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
    :root {
        --parchment: #fcf5e5;
        --ink: #1a140f;
        --gold: #b08d44;
        --crimson: #8b0000;
        --card-bg: #ffffff;
    }

    body {
        background-color: #121212;
        margin: 0;
        padding: 0; /* Changed to 0 to support sticky header edge-to-edge */
        font-family: 'Lora', serif;
        display: flex;
        justify-content: center; 
        align-items: flex-start;
        min-height: 100vh;
    }

    .ledger-container {
        max-width: 1200px;
        width: 100%;
        background-color: var(--parchment);
        background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
        border-left: 4px solid var(--gold);
        border-right: 4px solid var(--gold);
        padding: 0 30px 30px 30px;
        box-sizing: border-box;
        box-shadow: 0 0 50px rgba(0,0,0,0.5);
        min-height: 100vh;
    }

    /* --- STICKY HEADER SECTION --- */
    .sticky-header {
        position: sticky;
        top: 0;
        z-index: 1000;
        background-color: var(--parchment);
        background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
        padding-top: 30px;
        border-bottom: 3px double var(--gold);
        margin-bottom: 30px;
        /* Subtle shadow to indicate depth when scrolling */
        box-shadow: 0 10px 20px -10px rgba(0,0,0,0.15);
    }

    .header-section {
        text-align: center;
        margin-bottom: 20px;
    }

    h1 {
        font-family: 'MedievalSharp', cursive;
        font-size: 2.8rem;
        color: var(--crimson); 
        margin: 0 auto;
        letter-spacing: 2px;
    }

    .credits {
        font-style: italic;
        font-size: 1.1rem;
        color: var(--ink); 
        margin: 10px auto 0 auto;
    }

    .credits strong { color: var(--crimson); }

    .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        padding-bottom: 20px;
        max-width: 900px;
        margin: 0 auto;
    }

    @media (max-width: 600px) {
        .controls { grid-template-columns: 1fr; }
        h1 { font-size: 1.8rem; }
    }

    input, select {
        width: 100%;
        padding: 12px;
        border: 2px solid var(--gold);
        background: rgba(255,255,255,0.5);
        font-size: 1rem;
        box-sizing: border-box;
        font-family: 'Lora', serif;
    }

    /* --- ITEM GRID & CARDS --- */
    .items-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
    }

    .item-card {
        background: var(--card-bg);
        border: 1px solid var(--gold);
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: transform 0.2s;
    }

    .item-card:hover { transform: translateY(-5px); }

    .badge-container {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-bottom: 8px;
    }
        
    .card-header {
        background: #f4ebd0;
        padding: 12px 15px;
        border-bottom: 2px solid var(--gold);
        display: flex;
        flex-direction: column;
    }

    .class-badge {
        background: var(--crimson);
        color: white;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 0.7rem;
        text-transform: uppercase;
        font-weight: bold;
    }

    .item-title {
        margin: 5px 0 0 0;
        font-size: 1.2rem;
        line-height: 1.2;
        color: var(--ink);
        font-family: 'MedievalSharp', cursive;
    }

    .card-body { padding: 15px; }

    .ingredient-row {
        display: flex;
        flex-direction: column;
        padding: 10px 0;
        border-bottom: 1px solid rgba(176, 141, 68, 0.2);
    }

    .qty-name-group {
        display: flex;
        align-items: center;
        margin-bottom: 4px;
    }

    .qty {
        background: #eee;
        color: var(--crimson);
        font-weight: bold;
        padding: 2px 6px;
        border-radius: 4px;
        margin-right: 10px;
        min-width: 35px;
        text-align: center;
        font-size: 0.9rem;
    }

    .name { 
        font-size: 0.95rem; 
        font-weight: 700;
        color: var(--ink);
    }

    .location-text {
        font-size: 0.8rem;
        color: #666;
        padding-left: 45px;
        font-style: italic;
    }

    .location-text strong { color: var(--gold); }

    .discord-link {
        color: #5865F2;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
    }

    .discord-link:hover {
        color: var(--crimson);
        text-decoration: underline;
    }
	
	/* Color Palette from Reference Chart */
	.color-orange { color: #e67e22; font-weight: 800; } /* Deep Orange/Amber */
	.color-purple { color: #8e44ad; font-weight: 700; } /* Rich Purple */
	.color-blue { color: #16a085; font-weight: 700; }   /* Teal/Blue */

</style>
</head>

    function getColorClass(resourceName) {
    const name = resourceName.toLowerCase();
    
    // Orange Items (Formerly Yellow in Chart)
    if (name.includes("druegarsteel") || 
        name.includes("fallen god") || 
        name.includes("abyssal crystal") || 
        name.includes("menzoberranzan faerzress") || 
        name.includes("mushroom droplet") || 
        name.includes("perfect marilith")) {
        return 'color-orange';
    }
    
    // Purple Items
    if (name.includes("calcified webbing") || 
        name.includes("demonweb faerzress") || 
        name.includes("faerzress rock") || 
        name.includes("mushroom log") || 
        name.includes("shroomsap spores") || 
        name.includes("fungal moss") || 
        name.includes("fluorescent flora") || 
        name.includes("goristro hide") || 
        name.includes("luminescent darklake")) {
        return 'color-purple';
    }
    
    // Blue/Teal Items
    if (name.includes("terebinth")) return 'color-blue';
    
    return ''; // Default Ink Color
}
	
	function renderTable(data) {
        const grid = document.getElementById('itemsGrid');
        grid.innerHTML = '';

        data.forEach(entry => {
            const card = document.createElement('div');
            card.className = 'item-card';
            
            const badgesHtml = entry.classes.map(cls => 
                `<span class="class-badge">${cls}</span>`
            ).join('');

            const ingredientHtml = entry.ingredients.map(ing => {
				const parts = ing.resource.split(' ');
				const qty = parts.shift();
				const name = parts.join(' ');
				const colorClass = getColorClass(name); // Call the helper here

				return `
					<div class="ingredient-row">
						<div class="qty-name-group">
							<span class="qty">${qty}</span>
							<span class="name ${colorClass}">${name}</span>
						</div>
						<div class="location-text">Source: <strong>${ing.location}</strong></div>
					</div>`;
			}).join('');

            card.innerHTML = `
                <div class="card-header">
                    <div class="badge-container">
                        ${badgesHtml}
                    </div>
                    <h2 class="item-title">${entry.item}</h2>
                </div>
                <div class="card-body">
                    <div class="ingredient-list">${ingredientHtml}</div>
                </div>`;
            
            grid.appendChild(card);
        });
    }

    function filterData() {
        const searchVal = document.getElementById('searchInput').value.toLowerCase();
        const classVal = document.getElementById('classFilter').value;
        
        const filtered = craftingData.filter(d => {
            const matchesSearch = d.item.toLowerCase().includes(searchVal) || 
                                 d.classes.some(cls => cls.toLowerCase().includes(searchVal));
            const matchesClass = (classVal === "All" || d.classes.includes(classVal));
            return matchesSearch && matchesClass;
        });
        renderTable(filtered);
    }

    // Initial Load
    renderTable(craftingData);
</script>
