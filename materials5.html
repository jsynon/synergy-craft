<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masterwork Crafting Materials</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
    :root {
        --parchment: #fcf5e5;
        --ink: #1a140f;
        --gold: #b08d44;
        --crimson: #8b0000;
        --card-bg: #ffffff;
    }

    body {
    background-color: #121212;
    margin: 0;
    padding: 20px;
    font-family: 'Lora', serif;
    /* This centers the container horizontally and vertically */
    display: flex;
    justify-content: center; 
    align-items: flex-start;
    min-height: 100vh;
}

.ledger-container {
    max-width: 1200px;
    width: 100%; /* Ensures it takes up space but stays centered */
    margin: 0 auto; /* Backup centering for standard layouts */
    background-color: var(--parchment);
    background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
    border: 4px solid var(--gold);
    padding: 30px;
    box-sizing: border-box; /* Prevents padding from pushing it off-center */
    box-shadow: 0 0 50px rgba(0,0,0,0.5); /* Adds a nice glow against the dark background */
}

/* Ensure the header text itself is centered */
.ledger-header {
    text-align: center;
    width: 100%;
    margin-bottom: 30px;
}

.header-section {
    text-align: center;
    /* Changed to var(--gold) to match your :root */
    border-bottom: 3px double var(--gold); 
    margin-bottom: 30px;
    padding-bottom: 20px;
    width: 100%;
}

h1 {
    font-family: 'MedievalSharp', cursive;
    font-size: 2.8rem;
    /* Changed to var(--crimson) to match your :root */
    color: var(--crimson); 
    margin: 0 auto;
    display: block;
    letter-spacing: 2px;
}

.credits {
    font-style: italic;
    font-size: 1.1rem;
    /* Using your --ink color for the subtitle text */
    color: var(--ink); 
    margin: 10px auto 0 auto;
    display: block;
}

.credits strong {
    /* Using --crimson for the "Synergy", "Ivydora", and "Asura" names */
    color: var(--crimson); 
}

.subtitle {
    font-family: 'Lora', serif;
    font-size: 1rem;
    color: var(--ink);
    margin-top: 0;
    line-height: 1.5;
    opacity: 0.9;
}

.subtitle strong {
    color: var(--crimson);
    font-weight: 700;
}

.subtitle span {
    font-size: 0.9rem;
    font-style: italic;
    display: block;
    margin-top: 5px;
}

/* Responsive adjustment for mobile */
@media (max-width: 600px) {
    h1 { font-size: 1.8rem; }
    .subtitle { font-size: 0.9rem; }
}

    /* Controls Layout */
    .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-bottom: 30px;
    }

    @media (max-width: 600px) {
        .controls { grid-template-columns: 1fr; }
    }

    input, select {
        width: 100%;
        padding: 12px;
        border: 2px solid var(--gold);
        font-size: 1rem;
        box-sizing: border-box;
    }

    /* Card Grid */
    .items-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
    }

    .item-card {
        background: var(--card-bg);
        border: 1px solid var(--gold);
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: transform 0.2s;
    }

    .item-card:hover { transform: translateY(-5px); }

    .card-header {
        background: #f4ebd0;
        padding: 15px;
        border-bottom: 2px solid var(--gold);
    }

    .class-badge {
        background: var(--crimson);
        color: white;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 0.75rem;
        text-transform: uppercase;
        font-weight: bold;
    }

    .item-title {
        margin: 10px 0 0 0;
        font-size: 1.25rem;
        color: var(--ink);
    }

    .card-body { padding: 15px; }

    /* Ingredient Rows */
    .ingredient-row {
        display: flex;
        align-items: center;
        padding: 8px 0;
        border-bottom: 1px inset #eee;
        cursor: pointer;
        position: relative;
    }

    .qty {
        background: #eee;
        color: var(--crimson);
        font-weight: bold;
        padding: 2px 6px;
        border-radius: 4px;
        margin-right: 10px;
        min-width: 35px;
        text-align: center;
        font-size: 0.9rem;
    }

    .name { font-size: 0.95rem; flex: 1; }

    /* Location Popup (Tap to see) */
    .location-popup {
        display: none;
        position: absolute;
        bottom: 100%;
        left: 0;
        right: 0;
        background: var(--ink);
        color: #fff;
        padding: 10px;
        font-size: 0.8rem;
        border-radius: 5px;
        z-index: 10;
        text-align: center;
        box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
    }

    .show-loc .location-popup { display: block; }

.discord-link {
    color: #5865F2; /* Discord Blurple */
    text-decoration: none;
    font-weight: bold;
    font-size: 0.9rem;
    display: inline-block;
    margin-top: 8px;
    transition: 0.3s;
}

.discord-link:hover {
    color: var(--crimson);
    text-decoration: underline;
}

</style>
</head>

    function renderTable(data) {
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = '';

            data.forEach(entry => {
                const card = document.createElement('div');
                card.className = 'item-card';
                
                // Create the ingredient list
                const ingredientHtml = entry.ingredients.map(ing => {
                    // Split "36x Druegarsteel Scrap" into "36x" and "Druegarsteel Scrap"
                    const parts = ing.resource.split(' ');
                    const qty = parts.shift();
                    const name = parts.join(' ');

                    return `
                        <div class="ingredient-row" onclick="toggleTip(event, this)">
                            <span class="qty">${qty}</span>
                            <span class="name">${name}</span>
                            <div class="location-popup">${ing.location}</div>
                        </div>
                    `;
                }).join('');

                card.innerHTML = `
                    <div class="card-header">
                        <span class="class-badge">${entry.class}</span>
                        <h2 class="item-title">${entry.item}</h2>
                    </div>
                    <div class="card-body">
                        <div class="ingredient-list">
                            ${ingredientHtml}
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        function filterData() {
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            const classVal = document.getElementById('classFilter').value;
            const filtered = craftingData.filter(d => {
                const matchesSearch = d.item.toLowerCase().includes(searchVal) || d.class.toLowerCase().includes(searchVal);
                const matchesClass = (classVal === "All" || d.class === classVal);
                return matchesSearch && matchesClass;
            });
            renderTable(filtered);
        }

        function toggleTip(event, el) {
            event.stopPropagation();
            const isActive = el.classList.contains('show-loc');
            // Close all others
            document.querySelectorAll('.ingredient-row').forEach(row => row.classList.remove('show-loc'));
            // Toggle current
            if (!isActive) el.classList.add('show-loc');
        }

        // Close popups when clicking elsewhere
        document.addEventListener('click', () => {
            document.querySelectorAll('.ingredient-row').forEach(row => row.classList.remove('show-loc'));
        });

        // Initial Load
        renderTable(craftingData);
    </script>
